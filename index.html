<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruh Cat</title>
    <style>
        /* Black background and white text */
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif; /* Optional: Set a default font */
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Style for images */
        img {
            max-width: 100%;  /* Makes the image fit within its container */
            height: auto;     /* Keeps the aspect ratio */
            display: block;   /* Remove any extra space below the image */
            margin: 10px;     /* Space between images */
            max-width: 200px; /* Optional: Set max width for the images */
        }

        h1 {
            text-align: center;  /* Center the heading */
            margin-top: 20px;
        }

        .image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>Welcome to Bruh Cat!</h1>
    <div class="image-container">
        <!-- The images will be dynamically added here by JavaScript -->
    </div>

    <script>
        // Array of image filenames in the 'images' folder
        const imageFiles = [
            'cat1.jpg',
            'cat2.jpg',
            'cat3.jpg', // Add all your image filenames here
        ];

        // Function to display images dynamically
        const container = document.querySelector('.image-container');
        imageFiles.forEach(image => {
            const imgElement = document.createElement('img');
            imgElement.src = `images/${image}`;
            imgElement.alt = `Bruh Cat ${image}`;
            container.appendChild(imgElement);
        });
    </script>
</body>
</html>
