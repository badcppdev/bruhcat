<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruh Cat</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            margin-top: 20px;
        }

        .cat-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .cat-card {
            max-width: 300px;
            border: 1px solid white;
            padding: 10px;
            text-align: center;
            background-color: #222;
            border-radius: 10px;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Welcome to Bruh Cat!</h1>
    <div class="cat-container">
        <div class="cat-card">
            <a href="sorbis.html">
                <img src="images/sorb1.jpg" alt="Sorbis">
                <h2>Sorbis</h2>
            </a>
        </div>
        <div class="cat-card">
            <a href="hummus.html">
                <img src="images/hummus1.jpg" alt="Hummus">
                <h2>Hummus</h2>
            </a>
        </div>
        <div class="cat-card">
            <a href="buttermilk.html">
                <img src="images/buttermilk1.jpg" alt="Buttermilk">
                <h2>Buttermilk</h2>
            </a>
        </div>
        <div class="cat-card">
            <a href="littleguy.html">
                <img src="images/littleguy1.jpg" alt="Little Guy">
                <h2>Little Guy</h2>
            </a>
        </div>
    </div>
</body>
</html>
